<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boscombe Life Church — Room Booking</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1a2e4a;
    --navy-light: #243b5e;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #faf8f3;
    --cream-dark: #f0ece0;
    --text: #1a1a1a;
    --text-muted: #6b6357;
    --border: #ddd8c8;
    --white: #ffffff;
    --success: #2d6a4f;
    --danger: #c0392b;
    --shadow: 0 2px 12px rgba(26,46,74,0.10);
    --radius: 8px;
    --font: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
    --font-ui: 'Segoe UI', system-ui, sans-serif;
  }

  body {
    font-family: var(--font-ui);
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--navy);
    color: var(--white);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.18);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 16px 24px;
  }
  .church-logo {
    width: 44px; height: 44px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .church-logo svg { width: 26px; height: 26px; }
  header h1 {
    font-family: var(--font);
    font-size: 22px;
    font-weight: normal;
    letter-spacing: 0.5px;
    color: var(--white);
  }
  header p {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  /* SECTION HEADERS */
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .section-label h2 {
    font-family: var(--font);
    font-size: 20px;
    font-weight: normal;
    color: var(--navy);
  }
  .section-label .divider {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .week-nav {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--text-muted);
  }
  .week-nav button {
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .week-nav button:hover { background: var(--navy-light); }

  /* ROOMS SECTION */
  .rooms-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 40px;
  }
  @media (max-width: 700px) {
    .rooms-grid { grid-template-columns: 1fr 1fr; }
  }

  .room-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: transform 0.15s;
  }
  .room-card:hover { transform: translateY(-2px); }

  .room-photo {
    width: 100%;
    height: 200px;
    background: var(--cream-dark);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .room-photo img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    background: #f0ece0;
  }
  .room-photo-placeholder {
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 6px;
    font-size: 12px;
    letter-spacing: 0.5px;
  }
  .room-photo-placeholder svg { width: 32px; height: 32px; opacity: 0.4; }

  .room-info {
    padding: 10px 14px 12px;
  }
  .room-name {
    font-family: var(--font);
    font-size: 16px;
    color: var(--navy);
    font-weight: normal;
  }
  .room-bookings-count {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .room-week-bar {
    display: flex;
    gap: 2px;
    margin-top: 8px;
  }
  .day-slot {
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: var(--cream-dark);
    position: relative;
    cursor: default;
  }
  .day-slot.booked { background: var(--gold); }
  .day-slot.multi { background: var(--navy); }

  /* WEEKLY SCHEDULE TABLE */
  .schedule-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow-x: auto;
    margin-bottom: 40px;
  }
  table.schedule {
    width: 100%;
    border-collapse: collapse;
    min-width: 680px;
  }
  table.schedule th {
    background: var(--navy);
    color: var(--white);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.6px;
    padding: 10px 8px;
    text-align: center;
    position: sticky;
    top: 0;
  }
  table.schedule th:first-child { text-align: left; padding-left: 16px; width: 80px; }
  table.schedule td {
    border: 1px solid var(--border);
    padding: 4px;
    vertical-align: top;
    height: 48px;
    position: relative;
  }
  table.schedule td:first-child {
    background: var(--cream);
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    padding-right: 10px;
    padding-top: 6px;
    white-space: nowrap;
    font-weight: 500;
  }

  /* BOOKING CHIPS */
  .booking-chip {
    display: block;
    border-radius: 4px;
    padding: 3px 6px;
    font-size: 10px;
    font-weight: 500;
    line-height: 1.3;
    cursor: pointer;
    position: relative;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: filter 0.15s;
    margin-bottom: 1px;
  }
  .booking-chip:hover { filter: brightness(0.9); }
  .chip-0 { background: #e8f0fe; color: #1a4396; }
  .chip-1 { background: #e6f4ea; color: #1b5e35; }
  .chip-2 { background: #fce8e6; color: #922b21; }
  .chip-3 { background: #fff8e1; color: #7a5c00; }
  .chip-4 { background: #f3e8fd; color: #5b1e8f; }
  .chip-5 { background: #e8f5f9; color: #1a5f7a; }

  /* TOOLTIP */
  .tooltip {
    display: none;
    position: fixed;
    background: var(--navy);
    color: var(--white);
    padding: 10px 14px;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.6;
    max-width: 220px;
    z-index: 9999;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    pointer-events: none;
  }
  .tooltip.active { display: block; }
  .tooltip strong { color: var(--gold-light); font-size: 13px; display: block; margin-bottom: 4px; }

  /* BOOKING FORM */
  .form-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 32px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 24px;
  }
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
  }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--navy);
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: var(--font-ui);
    background: var(--cream);
    color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--navy);
    box-shadow: 0 0 0 3px rgba(26,46,74,0.10);
    background: var(--white);
  }
  .form-group textarea { min-height: 80px; resize: vertical; }
  .form-row { display: flex; gap: 12px; }
  .form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .btn {
    padding: 10px 22px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-family: var(--font-ui);
    font-weight: 500;
    transition: all 0.15s;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-ghost:hover { border-color: var(--navy); color: var(--navy); }
  .btn-primary {
    background: var(--navy);
    color: var(--white);
  }
  .btn-primary:hover { background: var(--navy-light); }

  /* SUCCESS TOAST */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--success);
    color: var(--white);
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 14px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 9999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* BOOKINGS LIST */
  .bookings-list { margin-bottom: 40px; }
  .booking-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-radius: var(--radius);
    background: var(--white);
    border: 1px solid var(--border);
    margin-bottom: 8px;
    font-size: 13px;
    transition: box-shadow 0.15s;
  }
  .booking-row:hover { box-shadow: var(--shadow); }
  .booking-room-badge {
    background: var(--navy);
    color: var(--gold-light);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 12px;
    font-weight: 600;
    min-width: 34px;
    text-align: center;
  }
  .booking-meta { flex: 1; }
  .booking-meta strong { display: block; color: var(--navy); font-size: 13px; }
  .booking-meta span { color: var(--text-muted); font-size: 12px; }
  .booking-delete {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    transition: all 0.15s;
  }
  .booking-delete:hover { color: var(--danger); background: #fce8e6; }
  .no-bookings {
    text-align: center;
    color: var(--text-muted);
    padding: 32px 16px;
    font-style: italic;
    font-family: var(--font);
    font-size: 15px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="church-logo">
      <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M13 1 L13 6 M11 3 H15" stroke="#1a2e4a" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M4 25 V13 L13 6 L22 13 V25 Z" stroke="#1a2e4a" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <rect x="10" y="17" width="6" height="8" rx="1" fill="#1a2e4a"/>
        <rect x="5" y="14" width="4" height="4" rx="0.5" fill="#1a2e4a" opacity="0.4"/>
        <rect x="17" y="14" width="4" height="4" rx="0.5" fill="#1a2e4a" opacity="0.4"/>
      </svg>
    </div>
    <div>
      <h1>Boscombe Life Church</h1>
      <p>Room Booking System</p>
    </div>
  </div>
</header>

<main>
  <!-- ROOMS OVERVIEW -->
  <div class="section-label">
    <h2>Available Rooms</h2>
    <div class="divider"></div>
  </div>
  <div class="rooms-grid" id="rooms-grid"></div>

  <!-- WEEKLY SCHEDULE -->
  <div class="section-label">
    <h2>Weekly Schedule</h2>
    <div class="divider"></div>
    <div class="week-nav">
      <button onclick="changeWeek(-1)">&#8592;</button>
      <span id="week-label"></span>
      <button onclick="changeWeek(1)">&#8594;</button>
    </div>
  </div>
  <div class="schedule-wrap">
    <table class="schedule" id="schedule-table">
      <thead id="schedule-head"></thead>
      <tbody id="schedule-body"></tbody>
    </table>
  </div>

  <!-- BOOKINGS LIST -->
  <div class="section-label">
    <h2>This Week's Bookings</h2>
    <div class="divider"></div>
  </div>
  <div class="bookings-list" id="bookings-list"></div>

  <!-- BOOKING FORM -->
  <div class="section-label">
    <h2>Make a Booking</h2>
    <div class="divider"></div>
  </div>
  <div class="form-card">
    <div class="form-grid">
      <div class="form-group">
        <label>Room</label>
        <select id="f-room">
          <option value="">Select a room...</option>
          <option>A1</option><option>B2</option><option>C3</option>
          <option>D4</option><option>E5</option><option>F6</option>
        </select>
      </div>
      <div class="form-group">
        <label>Responsible Person</label>
        <input type="text" id="f-name" placeholder="Full name" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="f-date" />
      </div>
      <div class="form-group">
        <label>Start Time</label>
        <input type="time" id="f-start" />
      </div>
      <div class="form-group">
        <label>End Time</label>
        <input type="time" id="f-end" />
      </div>
      <div class="form-group">
        <label>Contact / Phone</label>
        <input type="text" id="f-contact" placeholder="Email or phone" />
      </div>
      <div class="form-group full">
        <label>Purpose / Activity</label>
        <textarea id="f-purpose" placeholder="Describe the purpose of the booking..."></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="clearForm()">Clear</button>
      <button class="btn btn-primary" onclick="submitBooking()">Confirm Booking</button>
    </div>
  </div>
</main>

<!-- LOADING BAR -->
<div id="loading-bar" style="display:none;position:fixed;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,#c9a84c,#1a2e4a,#c9a84c);background-size:200%;animation:loadbar 1.2s linear infinite;z-index:9999;"></div>

<!-- ERROR BANNER -->
<div id="error-banner" style="display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#c0392b;color:white;padding:10px 22px;border-radius:6px;font-size:13px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);"></div>

<!-- TOOLTIP -->
<div class="tooltip" id="tooltip"></div>

<!-- TOAST -->
<div class="toast" id="toast">✓ Booking confirmed!</div>

<style>
@keyframes loadbar {
  0%{background-position:0%} 100%{background-position:200%}
}
</style>

<script>
// ── Supabase config ──────────────────────────────────────────────
const SUPABASE_URL = 'https://gzedvxpnkroftglhaiex.supabase.co';
const SUPABASE_KEY = 'sb_publishable_heBrN2iOiKiqHRahBcJIRw_FJ3H2nsA';
const API = `${SUPABASE_URL}/rest/v1/Booking`;
const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Prefer': 'return=representation'
};

// ── Room photos from GitHub repository ───────────────────────────
const PHOTOS_URL = `https://raw.githubusercontent.com/zneowxyz/BLC-Room-Booking/main/photos`;

function getRoomPhotoUrl(room) {
  return `${PHOTOS_URL}/${room}.JPG`;
}


const ROOMS = ['A1','B2','C3','D4','E5','F6'];
const DAYS  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const HOURS = ['08:00','09:00','10:00','11:00','12:00','13:00',
               '14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00'];

let bookings   = [];
let weekOffset = 0;

// ── Supabase helpers ─────────────────────────────────────────────
async function fetchBookings() {
  setLoading(true);
  try {
    const res = await fetch(`${API}?order=date,start`, { headers: HEADERS });
    if (!res.ok) throw new Error(await res.text());
    bookings = await res.json();
  } catch (e) {
    showError('Could not load bookings: ' + e.message);
  } finally {
    setLoading(false);
  }
}

async function insertBooking(data) {
  const res = await fetch(API, {
    method: 'POST',
    headers: HEADERS,
    body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(await res.text());
  const rows = await res.json();
  return rows[0];
}

async function removeBooking(id) {
  const res = await fetch(`${API}?id=eq.${id}`, {
    method: 'DELETE',
    headers: HEADERS
  });
  if (!res.ok) throw new Error(await res.text());
}

// ── UI helpers ───────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('loading-bar').style.display = on ? 'block' : 'none';
}
function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function formatDate(d) { return d.toISOString().split('T')[0]; }

function getWeekStart(offset) {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}
function getWeekDates(offset) {
  const start = getWeekStart(offset);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(start); d.setDate(start.getDate()+i); return d;
  });
}

// ── Render: rooms grid ───────────────────────────────────────────
function buildRoomsGrid() {
  const grid = document.getElementById('rooms-grid');
  const weekDateStrings = getWeekDates(weekOffset).map(formatDate);
  grid.innerHTML = ROOMS.map((room) => {
    const roomBookings = bookings.filter(b => b.room === room && weekDateStrings.includes(b.date));
    const daySlots = getWeekDates(weekOffset).map(d => {
      const count = bookings.filter(b => b.room === room && b.date === formatDate(d)).length;
      return `<div class="day-slot${count===1?' booked':count>1?' multi':''}"
        title="${DAYS[d.getDay()]}: ${count} booking${count!==1?'s':''}"></div>`;
    }).join('');
    const imgUrl = getRoomPhotoUrl(room);
    return `
    <div class="room-card">
      <div class="room-photo">
        <img src="${imgUrl}" alt="Room ${room}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
        <div class="room-photo-placeholder" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21,15 16,10 5,21"/>
          </svg>
          <span>No photo available</span>
        </div>
      </div>
      <div class="room-info">
        <div class="room-name">Room ${room}</div>
        <div class="room-bookings-count">${roomBookings.length} booking${roomBookings.length!==1?'s':''} this week</div>
        <div class="room-week-bar">${daySlots}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Render: schedule ─────────────────────────────────────────────
function buildSchedule() {
  const weekDates = getWeekDates(weekOffset);
  const fmt = d => d.toLocaleDateString('en-GB', {day:'numeric',month:'short'});
  document.getElementById('week-label').textContent =
    `${fmt(weekDates[0])} – ${fmt(weekDates[6])}`;

  document.getElementById('schedule-head').innerHTML = `<tr>
    <th>Time</th>
    ${weekDates.map(d =>
      `<th>${DAYS[d.getDay()]}<br>
       <span style="font-weight:400;opacity:0.7;font-size:10px">${d.getDate()}/${d.getMonth()+1}</span>
      </th>`).join('')}
  </tr>`;

  document.getElementById('schedule-body').innerHTML = HOURS.map(hour => {
    const h = parseInt(hour);
    const cells = weekDates.map(d => {
      const ds = formatDate(d);
      const hits = bookings.filter(b => {
        if (b.date !== ds) return false;
        return parseInt(b.start) <= h && parseInt(b.end) > h;
      });
      const chips = hits.map(b => {
        const colorIdx = ROOMS.indexOf(b.room) % 6;
        const safe = JSON.stringify(b).replace(/"/g,'&quot;');
        return `<span class="booking-chip chip-${colorIdx}"
          onmouseenter="showTooltip(event,${safe})" onmouseleave="hideTooltip()">
          ${b.room} · ${b.purpose.substring(0,18)}${b.purpose.length>18?'…':''}
        </span>`;
      }).join('');
      return `<td>${chips}</td>`;
    }).join('');
    return `<tr><td>${hour}</td>${cells}</tr>`;
  }).join('');
}

// ── Render: bookings list ────────────────────────────────────────
function buildList() {
  const weekDates = getWeekDates(weekOffset).map(formatDate);
  const week = bookings
    .filter(b => weekDates.includes(b.date))
    .sort((a,b) => a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
  const list = document.getElementById('bookings-list');
  if (!week.length) {
    list.innerHTML = `<div class="no-bookings">No bookings for this week.</div>`; return;
  }
  list.innerHTML = week.map(b => `
    <div class="booking-row">
      <span class="booking-room-badge">${b.room}</span>
      <div class="booking-meta">
        <strong>${b.purpose}</strong>
        <span>${b.date} · ${b.start}–${b.end} · ${b.name}${b.contact?' · '+b.contact:''}</span>
      </div>
      <button class="booking-delete" onclick="deleteBooking('${b.id}')" title="Delete booking">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="3,6 5,6 21,6"/>
          <path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/>
          <path d="M10,11v6M14,11v6"/>
          <path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/>
        </svg>
      </button>
    </div>`).join('');
}

// ── Render all ───────────────────────────────────────────────────
function render() { buildRoomsGrid(); buildSchedule(); buildList(); }

async function changeWeek(dir) { weekOffset += dir; render(); }

// ── Tooltip ──────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTooltip(e, b) {
  tooltip.innerHTML = `
    <strong>${b.room} — ${b.purpose}</strong>
    <span>📅 ${b.date}</span><br>
    <span>⏰ ${b.start} – ${b.end}</span><br>
    <span>👤 ${b.name}</span>
    ${b.contact ? `<br><span>📞 ${b.contact}</span>` : ''}`;
  tooltip.classList.add('active');
  positionTooltip(e);
}
function positionTooltip(e) {
  let x = e.clientX+14, y = e.clientY+14;
  if (x+230 > window.innerWidth)  x = e.clientX-230;
  if (y+140 > window.innerHeight) y = e.clientY-140;
  tooltip.style.left = x+'px'; tooltip.style.top = y+'px';
}
document.addEventListener('mousemove', e => {
  if (tooltip.classList.contains('active')) positionTooltip(e);
});
function hideTooltip() { tooltip.classList.remove('active'); }

// ── Submit booking ───────────────────────────────────────────────
async function submitBooking() {
  const room    = document.getElementById('f-room').value;
  const name    = document.getElementById('f-name').value.trim();
  const date    = document.getElementById('f-date').value;
  const start   = document.getElementById('f-start').value;
  const end     = document.getElementById('f-end').value;
  const purpose = document.getElementById('f-purpose').value.trim();
  const contact = document.getElementById('f-contact').value.trim();

  if (!room || !name || !date || !start || !end || !purpose) {
    alert('Please fill in all required fields (Room, Name, Date, Start/End Time, Purpose).');
    return;
  }
  if (start >= end) { alert('End time must be after start time.'); return; }

  const conflict = bookings.find(b =>
    b.room === room && b.date === date && !(end <= b.start || start >= b.end)
  );
  if (conflict) {
    alert(`Room ${room} is already booked on ${date} from ${conflict.start} to ${conflict.end}.\n\nPlease choose a different time or room.`);
    return;
  }

  const btn = document.querySelector('.btn-primary');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const saved = await insertBooking({ room, name, date, start, end, purpose, contact });
    bookings.push(saved);
    showToast(); clearForm(); render();
  } catch(e) {
    showError('Could not save booking: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Confirm Booking';
  }
}

function clearForm() {
  ['f-room','f-name','f-date','f-start','f-end','f-purpose','f-contact']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-date').value = formatDate(new Date());
}

// ── Delete booking ───────────────────────────────────────────────
async function deleteBooking(id) {
  if (!confirm('Remove this booking?')) return;
  try {
    await removeBooking(id);
    bookings = bookings.filter(b => b.id !== id);
    render();
  } catch(e) {
    showError('Could not delete booking: ' + e.message);
  }
}

// ── Toast ────────────────────────────────────────────────────────
const toast = document.getElementById('toast');
function showToast() {
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2800);
}

// ── Init ─────────────────────────────────────────────────────────
document.getElementById('f-date').value = formatDate(new Date());
fetchBookings().then(render);
</script>
</body>
</html>
